services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_AUTOMATION_RECIPIENT_EMAIL: ${NEXT_PUBLIC_AUTOMATION_RECIPIENT_EMAIL}
        NEXT_PUBLIC_AUTOMATION_RECIPIENT_NAME: ${NEXT_PUBLIC_AUTOMATION_RECIPIENT_NAME}
    image: guhr-onboarding:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "172.17.0.1:3007:3000"
